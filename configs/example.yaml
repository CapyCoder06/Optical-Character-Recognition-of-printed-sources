inputs:
  # Either provide a list of PDFs...
  pdfs:
    - "data/Print/Buendia - Instruccion.pdf"
  # ...or a directory containing PDFs:
  # pdf_dir: data/Print

  # Optional page selection (1-indexed). If omitted, all pages are processed.
  pages: [1]
  # page_ranges:
  #   - [1, 3]

pdf_to_images:
  dpi: 300
  image_format: png
  # On Windows, set this to your Poppler bin directory if Poppler is not on PATH.
  # Example: "C:/poppler/Library/bin"
  poppler_path: D:\AI\Project\Release-25.12.0-0\poppler-25.12.0\Library\bin

preprocessing:
  grayscale: true
  denoise:
    enabled: true
    method: median
    ksize: 3
  clahe:
    enabled: true
    clip_limit: 2.0
    tile_grid_size: [8, 8]
  binarize:
    enabled: true
    method: adaptive
  deskew:
    enabled: false

text_detection:
  mode: regions
  reading_order: single_column
  min_region_area: 5000
  line_segmentation:
    enabled: false

ocr:
  model_name: microsoft/trocr-base-printed
  device: cpu
  batch_size: 4

llm:
  enabled: false
  backend: pass_through
  prompt_version: v1

evaluation:
  enabled: false
  normalization:
    strip: true
    collapse_whitespace: true

runner:
  run_id: null
  results_dir: results
  resume: true
  force: false

